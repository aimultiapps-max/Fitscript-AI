<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitScript AI - Terms and Conditions</title>
    <meta name="description" content="FitScript AI Terms and Conditions" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="terms">
    <header class="hero">
      <div class="container hero-inner compact">
        <div class="hero-brand">
          <img src="./app-icon.png" alt="FitScript AI logo" class="app-logo" />
          <div class="brand-text">
            <h1>FitScript AI</h1>
            <p class="subtitle">Official legal document</p>
          </div>
        </div>
        <nav class="quick-links" aria-label="Legal pages">
          <a href="/">Home</a>
          <a href="/guide">Guide</a>
          <a href="/privacy">Privacy</a>
        </nav>
        <div class="lang-switch">
          <button id="lang-en" class="lang-btn active">English</button>
          <button id="lang-id" class="lang-btn">Bahasa Indonesia</button>
        </div>
        <div class="onboarding-showcase" aria-label="App onboarding preview">
          <img src="./onboarding-1.png" alt="FitScript AI onboarding preview 1" class="onboarding-shot" />
          <img src="./onboarding-2.png" alt="FitScript AI onboarding preview 2" class="onboarding-shot" />
          <img src="./onboarding-3.png" alt="FitScript AI onboarding preview 3" class="onboarding-shot" />
        </div>
      </div>
    </header>

    <main class="container single-doc">
      <section class="card doc-card">
        <h2 id="doc-title">Terms and Conditions</h2>
        <p id="doc-desc">Rules and terms for using FitScript AI.</p>
        <article id="doc-content" class="doc-content">Loading...</article>
      </section>
    </main>

    <footer class="container footer">
      <p>© <span id="year"></span> FitScript AI. All rights reserved.</p>
    </footer>

    <script src="./doc-page.js"></script>
  </body>
</html>
